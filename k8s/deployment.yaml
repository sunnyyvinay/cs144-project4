apiVersion: apps/v1
kind: Deployment
metadata:
  name: mandelbrot-deployment
spec:
  # TODO
  replicas: REPLACE_ME

  selector:
    matchLabels:
      app: mandelbrot
  template:
    metadata:
      labels:
        app: mandelbrot
    spec:
      containers:
        - name: mandelbrot
          # TODO: Set the container image.
          #
          # For local minikube testing, use the local image name
          # (the -t name you gave to `docker build`) and add:
          #   imagePullPolicy: Never
          # since the image is loaded into minikube, not a remote registry.
          #
          # For GKE, use your Artifact Registry URL. The image URL is not
          # just IMAGE:TAG — it includes the registry hostname, your
          # project ID, and the repository name:
          #   REGION-docker.pkg.dev/PROJECT_ID/REPO_NAME/IMAGE:TAG
          # For example:
          #   us-west1-docker.pkg.dev/my-project-12345/mandelbrot-repo/mandelbrot:v1
          #
          # imagePullPolicy controls when Kubernetes pulls the image:
          #   Always       — pull from the registry every time a pod starts
          #   IfNotPresent — only pull if the image isn't already on the node
          #   Never        — never pull; only use a local image
          image: REPLACE_ME
          imagePullPolicy: REPLACE_ME

          ports:
            # The port the application listens on inside the container
            - containerPort: 3000

          resources:
            # "requests" is the minimum amount of resources guaranteed to this container.
            # The Kubernetes scheduler uses these values to decide which node to place the pod on.
            requests:
              # 250 millicores = 25% of one CPU core
              cpu: "250m"
              # 256 mebibytes of RAM
              memory: "256Mi"
            # "limits" is the maximum amount of resources this container can use.
            # If the container exceeds the memory limit, it is killed (OOMKilled).
            # If it exceeds the CPU limit, it is throttled.
            limits:
              # 500 millicores = 50% of one CPU core
              cpu: "500m"
              # 512 mebibytes of RAM
              memory: "512Mi"

          # readinessProbe checks whether the container is ready to accept traffic.
          # Until this probe succeeds, the pod is not added to the Service's endpoints.
          readinessProbe:
            httpGet:
              path: /health
              port: 3000

          # livenessProbe checks whether the container is still running correctly.
          # If this probe fails, Kubernetes kills the container and restarts it.
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
